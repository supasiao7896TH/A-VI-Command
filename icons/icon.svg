<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#050d1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Building outline -->
  <rect x="96" y="160" width="320" height="280" rx="12" fill="none" stroke="url(#gold)" stroke-width="8"/>
  <!-- Floors -->
  <line x1="96" y1="240" x2="416" y2="240" stroke="rgba(240,192,64,0.3)" stroke-width="3"/>
  <line x1="96" y1="320" x2="416" y2="320" stroke="rgba(240,192,64,0.3)" stroke-width="3"/>
  <!-- Windows -->
  <rect x="128" y="184" width="40" height="32" rx="4" fill="rgba(56,189,248,0.6)"/>
  <rect x="192" y="184" width="40" height="32" rx="4" fill="rgba(45,212,191,0.6)"/>
  <rect x="256" y="184" width="40" height="32" rx="4" fill="rgba(240,192,64,0.7)"/>
  <rect x="320" y="184" width="40" height="32" rx="4" fill="rgba(167,139,250,0.6)"/>
  <rect x="128" y="264" width="40" height="32" rx="4" fill="rgba(56,189,248,0.4)"/>
  <rect x="192" y="264" width="40" height="32" rx="4" fill="rgba(45,212,191,0.4)"/>
  <rect x="256" y="264" width="40" height="32" rx="4" fill="rgba(240,192,64,0.5)"/>
  <rect x="320" y="264" width="40" height="32" rx="4" fill="rgba(167,139,250,0.4)"/>
  <!-- Door -->
  <rect x="216" y="368" width="80" height="72" rx="6" fill="rgba(240,192,64,0.2)" stroke="url(#gold)" stroke-width="3"/>
  <!-- VI Text -->
  <text x="256" y="136" font-family="serif" font-size="64" font-weight="700" fill="url(#gold)" text-anchor="middle">VI</text>
  <!-- Antenna / Signal -->
  <line x1="256" y1="160" x2="256" y2="100" stroke="url(#gold)" stroke-width="4"/>
  <circle cx="256" cy="92" r="10" fill="url(#gold)"/>
  <circle cx="256" cy="92" r="18" fill="none" stroke="rgba(240,192,64,0.4)" stroke-width="3"/>
  <circle cx="256" cy="92" r="26" fill="none" stroke="rgba(240,192,64,0.2)" stroke-width="2"/>
</svg>
